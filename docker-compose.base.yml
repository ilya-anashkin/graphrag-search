services:
  opensearch:
    image: opensearchproject/opensearch:3.5.0
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms1024m -Xmx1024m
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=v}Jp&0b7@+UOL2I
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/9200' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  neo4j:
    image: neo4j:5.26.23
    environment:
      - NEO4J_AUTH=neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password \"RETURN 1;\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
      - .env.docker
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "8000"
    depends_on:
      opensearch:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/health/live', timeout=3)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
