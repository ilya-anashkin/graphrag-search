services:
  opensearch:
    image: opensearchproject/opensearch:2.17.1
    container_name: opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/9200' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  neo4j:
    image: neo4j:5.26.0
    container_name: neo4j
    environment:
      - NEO4J_AUTH=neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password \"RETURN 1;\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: graphrag-search-api
    environment:
      - APP_NAME=graphrag-search-api
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - APP_LOG_LEVEL=INFO
      - REQUEST_ID_HEADER=X-Request-ID
      - API_V1_PREFIX=/v1
      - DOMAIN_NAME=movies
      - DOMAINS_ROOT=app/domains
      - API_TIMEOUT_SECONDS=5
      - RETRY_ATTEMPTS=3
      - RETRY_WAIT_SECONDS=0.5
      - OPENSEARCH_BASE_URL=http://opensearch:9200
      - OPENSEARCH_INDEX=movies
      - OPENSEARCH_TITLE_FIELD=title
      - OPENSEARCH_CONTENT_FIELD=content
      - OPENSEARCH_METADATA_FIELD=metadata
      - OPENSEARCH_VECTOR_FIELD=embedding
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - NEO4J_DATABASE=neo4j
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-local}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-384}
      - EMBEDDING_DEVICE=${EMBEDDING_DEVICE:-cpu}
      - EMBEDDING_NORMALIZE=${EMBEDDING_NORMALIZE:-true}
      - EMBEDDING_PRELOAD_ON_STARTUP=${EMBEDDING_PRELOAD_ON_STARTUP:-true}
      - LEXICAL_SEARCH_WEIGHT=0.6
      - VECTOR_SEARCH_WEIGHT=0.4
      - LEXICAL_CANDIDATE_SIZE=40
      - VECTOR_CANDIDATE_SIZE=60
      - BULK_INDEX_BATCH_SIZE=100
    ports:
      - "8000:8000"
    depends_on:
      opensearch:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: [
        "CMD-SHELL",
        "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health/live')\" || exit 1",
      ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
