services:
  opensearch:
    image: opensearchproject/opensearch:2.17.1
    container_name: opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=v}Jp&0b7@+UOL2I
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/9200' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  neo4j:
    image: neo4j:5.26.0
    container_name: neo4j
    environment:
      - NEO4J_AUTH=neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password \"RETURN 1;\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
